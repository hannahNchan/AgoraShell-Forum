<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="iconBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1e40"/>
      <stop offset="100%" style="stop-color:#091530"/>
    </linearGradient>
    <linearGradient id="hexTrans" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#55cdfc"/>
      <stop offset="30%" style="stop-color:#f7a8b8"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="70%" style="stop-color:#f7a8b8"/>
      <stop offset="100%" style="stop-color:#55cdfc"/>
    </linearGradient>
    <linearGradient id="green2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
    <filter id="gG2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gH2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gT2">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#55cdfc" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Ícono azul marino -->
  <rect x="20" y="20" width="240" height="240" rx="14" fill="url(#iconBg2)" filter="url(#iconShadow)"/>
  <polygon points="140,58 204,94 204,166 140,202 76,166 76,94"
    fill="none" stroke="url(#hexTrans)" stroke-width="3"
    filter="url(#gH2)" opacity="0.9"/>
  <polygon points="140,76 192,104 192,156 140,184 88,156 88,104"
    fill="none" stroke="url(#hexTrans)" stroke-width="1" opacity="0.2"/>
  <polyline points="100,112 142,140 100,168"
    fill="none" stroke="url(#green2)" stroke-width="11"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#gG2)"/>
  <rect x="152" y="146" width="38" height="10" rx="5"
    fill="url(#hexTrans)" opacity="0.95"/>
  <!-- Divisor -->
  <line x1="278" y1="36" x2="278" y2="244" stroke="#2a2a55" stroke-width="1.5"/>
  <!-- Texto -->
  <text x="308" y="150"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="92" font-weight="900" letter-spacing="-3"
    fill="#55cdfc" filter="url(#gT2)">AGORA</text>
  <line x1="308" y1="160" x2="770" y2="160" stroke="url(#hexTrans)" stroke-width="1.2" opacity="0.4"/>
  <text x="312" y="232"
    font-family="'Arial Black', 'Helvetica Neue', sans-serif"
    font-size="60" font-weight="900" letter-spacing="22"
    fill="#f7a8b8" filter="url(#gT2)">SHELL</text>
</svg>

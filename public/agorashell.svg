<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280">
  <defs>
    <linearGradient id="iconBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e1e40"/>
      <stop offset="100%" style="stop-color:#091530"/>
    </linearGradient>
    <linearGradient id="hexTrans" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#55cdfc"/>
      <stop offset="30%" style="stop-color:#f7a8b8"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="70%" style="stop-color:#f7a8b8"/>
      <stop offset="100%" style="stop-color:#55cdfc"/>
    </linearGradient>
    <linearGradient id="green2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ff88"/>
      <stop offset="100%" style="stop-color:#00cc66"/>
    </linearGradient>
    <filter id="gG2" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gH2">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#55cdfc" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Fondo cuadrado redondeado -->
  <rect x="0" y="0" width="280" height="280" rx="40" fill="url(#iconBg2)" filter="url(#iconShadow)"/>
  <!-- Hexágono centrado -->
  <polygon points="140,48 214,88 214,168 140,208 66,168 66,88"
    fill="none" stroke="url(#hexTrans)" stroke-width="4"
    filter="url(#gH2)" opacity="0.9"/>
  <polygon points="140,70 200,104 200,172 140,206 80,172 80,104"
    fill="none" stroke="url(#hexTrans)" stroke-width="1.5" opacity="0.25"/>
  <!-- > prompt -->
  <polyline points="88,108 140,140 88,172"
    fill="none" stroke="url(#green2)" stroke-width="14"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#gG2)"/>
  <!-- cursor -->
  <rect x="154" y="147" width="48" height="12" rx="6"
    fill="url(#hexTrans)" opacity="0.95"/>
</svg>
